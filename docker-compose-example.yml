# Kikubot deployment — one service per agent.
#
# Every service shares the same secrets file (configs/secrets.env) and is
# distinguished only by AGENT_EMAIL. The container reads configs/agents.yaml
# at startup, finds the matching entry, and resolves its mailbox password
# from <UPPERCASED_LOCAL_PART>_EMAIL_PASSWORD.

services:
  kiku:
    build: .
    env_file:
      - configs/secrets.env
    environment:
      - RUNNING_IN_CONTAINER=true
      - AGENT_EMAIL=kiku@agents.example.com
#      - DEBUG_ANTHROPIC_REQUEST=1
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
#      - "mail.agents.example.com:host-gateway" # optional for localhost email server
    volumes:
      - ./data/kiku:/app/data

