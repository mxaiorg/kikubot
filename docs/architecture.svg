  <rect class="st8" width="1440" height="980"/>
  <g class="st18">
    <text class="st21" transform="translate(60 62)"><tspan x="0" y="0">Kikubot Architecture</tspan></text>
  </g>
  <text class="st19" transform="translate(60 91)"><tspan x="0" y="0">Email-driven multi-agent runtime: each container is one inbox-backed agent, configured by roster, external peers, secrets, knowledge, tools, and provider adapters.</tspan></text>
  <rect class="st2" x="40" y="120" width="1360" height="720"/>
  <g class="st18">
    <text class="st20" transform="translate(60 151)"><tspan x="0" y="0">Deployment shape</tspan></text>
  </g>
  <rect class="st16" x="70" y="176" width="220" height="154"/>
  <text class="st11" transform="translate(96 224)"><tspan x="0" y="0">Humans and systems</tspan></text>
  <text class="st15" transform="translate(96 252)"><tspan x="0" y="0">Send requests by email</tspan></text>
  <text class="st15" transform="translate(96 274)"><tspan x="0" y="0">Receive replies and bounces</tspan></text>
  <text class="st15" transform="translate(96 296)"><tspan x="0" y="0">Can follow agent threads</tspan></text>
  <circle class="st29" cx="96" cy="312" r="14"/>
  <text class="st9" transform="translate(91.7 315)"><tspan x="0" y="0">1</tspan></text>
  <rect class="st26" x="70" y="350" width="220" height="99.3"/>
  <text class="st11" transform="translate(96 379)"><tspan x="0" y="0">External partner agents</tspan></text>
  <text class="st15" transform="translate(96 405)"><tspan x="0" y="0">Other machines or domains</tspan></text>
  <text class="st15" transform="translate(96 427)"><tspan x="0" y="0">Reachable when rostered</tspan></text>
  <rect class="st22" x="340" y="174" width="250" height="205"/>
  <text class="st11" transform="translate(368 209)"><tspan x="0" y="0">IMAP / SMTP mail server</tspan></text>
  <text class="st15" transform="translate(368 237)"><tspan x="0" y="0">Universal async message bus</tspan></text>
  <text class="st15" transform="translate(368 259)"><tspan x="0" y="0">One mailbox per agent identity</tspan></text>
  <text class="st15" transform="translate(368 281)"><tspan x="0" y="0">Threads carry history with</tspan></text>
  <text class="st13" transform="translate(368 304)"><tspan x="0" y="0">References / In-Reply-To</tspan></text>
  <text class="st15" transform="translate(368 329)"><tspan x="0" y="0">Optional docker-mailserver sidecar</tspan></text>
  <circle class="st29" cx="368" cy="350" r="14"/>
  <text class="st9" transform="translate(364.7 353)"><tspan x="0" y="0">2</tspan></text>
  <rect class="st16" x="660" y="150" width="510" height="534"/>
  <text class="st17" transform="translate(690 186)"><tspan x="0" y="0">One kikubot container</tspan></text>
  <text class="st14" transform="translate(971.1 177.3)"><tspan x="0" y="0">same Go binary for all agents</tspan></text>
  <rect class="st25" x="690" y="215" width="205" height="84"/>
  <text class="st11" transform="translate(716 242)"><tspan x="0" y="0">Startup</tspan></text>
  <text class="st15" transform="translate(716 266)"><tspan x="0" y="0">Load env, roster, external peers</tspan></text>
  <text class="st12" transform="translate(716 286)"><tspan x="0" y="0">AGENT_EMAIL -&gt; agent config</tspan></text>
  <circle class="st29" cx="871" cy="242" r="14"/>
  <text class="st9" transform="translate(867.7 245)"><tspan x="0" y="0">3</tspan></text>
  <rect class="st22" x="935" y="215" width="205" height="84"/>
  <text class="st11" transform="translate(961 242)"><tspan x="0" y="0">Poll loop</tspan></text>
  <text class="st15" transform="translate(961 266)"><tspan x="0" y="0">Every 30 seconds</tspan></text>
  <text class="st15" transform="translate(961 286)"><tspan x="0" y="0">Fetch unseen INBOX mail</tspan></text>
  <rect class="st24" x="690" y="330" width="205" height="98"/>
  <text class="st11" transform="translate(716 357)"><tspan x="0" y="0">Guards</tspan></text>
  <text class="st15" transform="translate(716 381)"><tspan x="0" y="0">Auto-replies bypass LLM</tspan></text>
  <text class="st15" transform="translate(716 403)"><tspan x="0" y="0">ACL bounces unauthorized mail</tspan></text>
  <circle class="st29" cx="871" cy="357" r="14"/>
  <text class="st9" transform="translate(867.7 360)"><tspan x="0" y="0">4</tspan></text>
  <rect class="st23" x="935" y="330" width="205" height="98"/>
  <text class="st11" transform="translate(961 357)"><tspan x="0" y="0">Thread state</tspan></text>
  <text class="st15" transform="translate(961 381)"><tspan x="0" y="0">Resolve root message ID</tspan></text>
  <text class="st15" transform="translate(961 403)"><tspan x="0" y="0">Load memory and status</tspan></text>
  <circle class="st29" cx="1116" cy="357" r="14"/>
  <text class="st9" transform="translate(1112.6631 360)"><tspan x="0" y="0">5</tspan></text>
  <rect class="st26" x="690" y="462" width="205" height="112"/>
  <text class="st11" transform="translate(716 489)"><tspan x="0" y="0">Prompt builder</tspan></text>
  <text class="st15" transform="translate(716 513)"><tspan x="0" y="0">System prompt</tspan></text>
  <text class="st15" transform="translate(716 535)"><tspan x="0" y="0">Local + external coworkers</tspan></text>
  <text class="st15" transform="translate(716 557)"><tspan x="0" y="0">Knowledge + tool instructions</tspan></text>
  <circle class="st29" cx="871" cy="489" r="14"/>
  <text class="st9" transform="translate(867.7 492)"><tspan x="0" y="0">6</tspan></text>
  <rect class="st22" x="935" y="462" width="205" height="112"/>
  <text class="st11" transform="translate(961 489)"><tspan x="0" y="0">Agent loop</tspan></text>
  <text class="st15" transform="translate(961 513)"><tspan x="0" y="0">Call provider</tspan></text>
  <text class="st15" transform="translate(961 535)"><tspan x="0" y="0">Execute tool_use blocks</tspan></text>
  <text class="st15" transform="translate(961 557)"><tspan x="0" y="0">Repeat until end_turn</tspan></text>
  <circle class="st29" cx="1116" cy="489" r="14"/>
  <text class="st9" transform="translate(1112.6631 492)"><tspan x="0" y="0">7</tspan></text>
  <rect class="st25" x="690" y="604" width="450" height="52.5"/>
  <text class="st15" transform="translate(716 631)"><tspan x="0" y="0">Mark seen after success, preserve history after errors, retry up to configured</tspan><tspan x="0" y="14.4">budget.</tspan></text>
  <rect class="st16" x="70" y="460" width="250" height="231.6"/>
  <text class="st11" transform="translate(98 494)"><tspan x="0" y="0">Configuration inputs</tspan></text>
  <line class="st5" x1="98" y1="509" x2="292" y2="509"/>
  <text class="st13" transform="translate(98 535)"><tspan x="0" y="0">configs/agents.yaml</tspan></text>
  <text class="st15" transform="translate(98 556)"><tspan x="0" y="0">Local roster, defaults, tools</tspan></text>
  <text class="st15" transform="translate(98 577)"><tspan x="0" y="0">external: identity-only peers</tspan></text>
  <text class="st13" transform="translate(98 605)"><tspan x="0" y="0">configs/secrets.env</tspan></text>
  <text class="st15" transform="translate(98 626)"><tspan x="0" y="0">Provider, mailbox, SaaS credentials</tspan></text>
  <text class="st13" transform="translate(98 654)"><tspan x="0" y="0">configs/knowledge/*</tspan></text>
  <text class="st15" transform="translate(120.6 684)"><tspan x="0" y="0">Common and per-agent markdown</tspan></text>
  <rect class="st16" x="360" y="455" width="230" height="236.6"/>
  <text class="st11" transform="translate(388 489)"><tspan x="0" y="0">Persistent data volume</tspan></text>
  <line class="st5" x1="388" y1="504" x2="562" y2="504"/>
