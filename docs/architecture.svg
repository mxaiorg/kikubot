  <rect class="st26" x="720" y="755" width="142" height="28"/>
  <text class="st14" transform="translate(744 774)"><tspan x="0" y="0">Box CLI</tspan></text>
  <rect class="st26" x="876" y="755" width="142" height="28"/>
  <text class="st14" transform="translate(900 774)"><tspan x="0" y="0">Tavily</tspan></text>
  <rect class="st26" x="1032" y="755" width="142" height="28"/>
  <text class="st14" transform="translate(1056 774)"><tspan x="0" y="0">Xero</tspan></text>
  <rect class="st26" x="1188" y="755" width="142" height="28"/>
  <text class="st14" transform="translate(1212 774)"><tspan x="0" y="0">Tika / OCR</tspan></text>
  <rect class="st16" x="70" y="848" width="1310" height="104"/>
  <g class="st18">
    <text class="st20" transform="translate(96 890)"><tspan x="0" y="0">Agent collaboration model</tspan></text>
  </g>
  <text class="st15" transform="translate(96 916)"><tspan x="0" y="0">Coordinator and specialist agents are peers. Delegation is just another email thread sent by the message tool, so SMTP/IMAP provide identity, durability, auditability, and backpressure.</tspan></text>
  <text class="st15" transform="translate(96 938)"><tspan x="0" y="0">External peers from agents.yaml are rendered into {{coworkers}} with scope=&quot;external&quot;; exact rostered addresses bypass the same-domain send gate, while inbound mail still needs whitelist coverage.</tspan></text>
  <circle class="st29" cx="1352" cy="890" r="14"/>
  <text class="st9" transform="translate(1348.6631 893)"><tspan x="0" y="0">9</tspan></text>
  <text class="st14" transform="translate(521.9 193)"><tspan x="0" y="0">poll / fetch</tspan></text>
  <text class="st14" transform="translate(430.8 686.5)"><tspan x="0" y="0">save memory, snooze, status</tspan></text>
  <text class="st14" transform="translate(148.7 445)"><tspan x="0" y="0">external address allowlist</tspan></text>
  <text class="st14" transform="translate(1149.1739 455.403) rotate(-80.6099)"><tspan x="0" y="0">tool schema + messages</tspan></text>
  <text class="st14" transform="translate(1194.959 485.2637) rotate(-83.7669)"><tspan x="0" y="0">provider response</tspan></text>
  <text class="st14" transform="translate(979.4 748.9) rotate(-54.4)"><tspan x="0" y="0">same domain or </tspan><tspan x="0" y="14.4">known peer only</tspan></text>
