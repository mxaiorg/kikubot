  <text class="st12" transform="translate(388 530)"><tspan x="0" y="0">data/memory/*.json</tspan></text>
  <text class="st15" transform="translate(388 551)"><tspan x="0" y="0">Per-thread conversation history</tspan></text>
  <g class="st18">
    <text class="st10" transform="translate(388 579)"><tspan x="0" y="0">data/snooze.json</tspan></text>
  </g>
  <text class="st15" transform="translate(388 600)"><tspan x="0" y="0">Scheduled replay tasks</tspan></text>
  <g class="st18">
    <text class="st10" transform="translate(388 628)"><tspan x="0" y="0">thread_index</tspan></text>
  </g>
  <text class="st15" transform="translate(388 649)"><tspan x="0" y="0">Outlook fallback mapping</tspan></text>
  <rect class="st16" x="1210" y="174" width="170" height="170"/>
  <g class="st18">
    <text class="st20" transform="translate(1234 209)"><tspan x="0" y="0">LLM providers</tspan></text>
  </g>
  <text class="st15" transform="translate(1234 237)"><tspan x="0" y="0">Anthropic Messages API</tspan></text>
  <text class="st15" transform="translate(1234 259)"><tspan x="0" y="0">OpenRouter adapter</tspan></text>
  <text class="st15" transform="translate(1234 281)"><tspan x="0" y="0">Provider-neutral tool</tspan></text>
  <text class="st15" transform="translate(1234 303)"><tspan x="0" y="0">schema from agent loop</tspan></text>
  <rect class="st16" x="1210" y="395" width="170" height="220"/>
  <g class="st18">
    <text class="st20" transform="translate(1234 430)"><tspan x="0" y="0">Tool surface</tspan></text>
  </g>
  <text class="st15" transform="translate(1234 458)"><tspan x="0" y="0">Core tools always on</tspan></text>
  <text class="st15" transform="translate(1234 480)"><tspan x="0" y="0">Configured tools by key</tspan></text>
  <text class="st15" transform="translate(1234 502)"><tspan x="0" y="0">Local tools and CLIs</tspan></text>
  <text class="st15" transform="translate(1234 524)"><tspan x="0" y="0">MCP bridges</tspan></text>
  <text class="st15" transform="translate(1234 546)"><tspan x="0" y="0">message_tool peer gate</tspan></text>
  <text class="st15" transform="translate(1234 568)"><tspan x="0" y="0">Sidecars and SaaS APIs</tspan></text>
  <circle class="st29" cx="1355" cy="430" r="14"/>
  <text class="st9" transform="translate(1351.6631 433)"><tspan x="0" y="0">8</tspan></text>
  <rect class="st2" x="70" y="705" width="1310" height="95"/>
  <g class="st18">
    <text class="st20" transform="translate(96 737)"><tspan x="0" y="0">Common integrations behind tools</tspan></text>
  </g>
  <rect class="st26" x="96" y="755" width="142" height="28"/>
  <text class="st14" transform="translate(120 774)"><tspan x="0" y="0">Salesforce</tspan></text>
  <rect class="st26" x="252" y="755" width="142" height="28"/>
  <text class="st14" transform="translate(276 774)"><tspan x="0" y="0">WordPress</tspan></text>
