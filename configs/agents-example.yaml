# Kikubot deployment configuration.
#
# common:  shared defaults inherited by every agent
# agents:  per-agent identity, role, tools, plus optional overrides
#
# Secrets (API keys, mailbox passwords) live in configs/secrets.env — never
# inline them here. The runtime selects its identity from AGENT_EMAIL (set
# per-service in docker-compose.yml).
#
# Copy this file to configs/agents.yaml and edit the values.

common:
  email_server: mail.agents.example.com:993
  smtp_server: mail.agents.example.com:587
  email_insecure_tls: false

  max_history_chars: 200000
  max_tokens: 6000
  agent_timeout: 300
  max_turns: 20

  # Stuck-task watchdog. When an agent sets a task to "waiting" (e.g. after
  # delegating to a coworker), re-wake it after this many minutes if the thread
  # is still waiting — so a delegate that never replies doesn't hang the task
  # forever. The agent is nudged to follow up or fall back to answering the
  # requester; after a couple of fruitless nudges the task is failed and the
  # upstream caller notified. 0 (or omit) disables it. A few hours is sensible
  # so it only fires for genuinely stuck threads, well after any normal reply.
  waiting_watchdog_minutes: 0

  system_prompt: |
    You are a helpful agent that serves two groups — users and coworkers. Your role is to resolve tasks submitted by users, drawing on your coworkers below as needed.
    {{coworkers}}

  coordinator_system_prompt: |
    You are a helpful Coordinator Agent. You coordinate and execute tasks sent to you by users with the help of your coworkers, if there are any listed. Your role is to resolve and report back on tasks submitted by users, drawing on your tools and available coworkers as needed. You ALWAYS report back ('report' tool) to the user when a task is concluded, can not be concluded, or you have questions for the user.
    {{coworkers}}

agents:
  - name: Kiku
    email: kiku@agents.example.com
    role: Coordinator
    description: Communicates with users. Manages tasks and resources. Coordinates other agents.
    tools: [report, snooze]
    # Optional: remove normally core tools for public/customer-facing agents.
    # Names match the tool's runtime Name, not the registry key.
    # disabled_tools: [message_tool, mailbox_search, save_attachment]
    # Coordinator overrides — bigger history budget and more turns because
    # each delegation round-trip burns a turn.
    llm_provider: openrouter
    llm_model: anthropic/claude-sonnet-4.6
    llm_openrouter_backup: [z-ai/glm-5.1, openai/gpt-5.5]
    max_history_chars: 300000
    max_turns: 40
    whitelist: [example.com, agents.example.com]
    system_prompt: |
      Kiku, you are a helpful Coordinator Agent. You coordinate and execute tasks sent to you by users with the help of your coworkers, if there are any listed. Your role is to resolve and report back on tasks submitted by users, drawing on your tools and available coworkers as needed. You ALWAYS report back (report_tool) to the user when a task is concluded, can not be concluded, or you have questions for the user.
      {{coworkers}}

  - name: Beta
    email: beta@agents.example.com
    role: CRM, Email Archivist
    description: Manages Salesforce and access to the company email record.
    tools: [mxmcp, salesforce_mcp]
    llm_provider: openrouter
    llm_model: anthropic/claude-sonnet-4.6
    llm_openrouter_backup: [z-ai/glm-5.1]
    whitelist: [example.com, agents.example.com]

  - name: Gamma
    email: gamma@agents.example.com
    role: Social Media, Web Searcher
    description: Creates draft social media posts. Searches the web for relevant content. Video archivist.
    tools: [buffer_mcp, tavily_mcp, vimeo]
    llm_provider: openrouter
    llm_model: anthropic/claude-sonnet-4.6
    llm_openrouter_backup: [z-ai/glm-5.1]
    max_tokens: 12000
    agent_timeout: 600
    whitelist: [example.com, agents.example.com]

  - name: Delta
    email: delta@agents.example.com
    role: Webmaster, Web Searcher, Knowledge Base (FAQ) Maintainer, File Manager
    description: Updates the company website. Maintains the FAQ knowledge base. Retrieves company files. Downloads URLs. Converts files to text.
    tools: [wordpress, tavily_mcp, helpjuice, box_cli, download, file_text]
    llm_provider: anthropic
    llm_model: claude-sonnet-4-6
    agent_timeout: 600
    whitelist: [example.com, agents.example.com]

# Remote MCP servers (the ones referenced by `key` in `tools:` above — e.g.
# mxmcp, buffer_mcp, tavily_mcp, box_mcp) are declared in their own file:
# configs/mcp_servers.yaml (see configs/mcp_servers-example.yaml).

# external:  partner agents that run on OTHER machines and/or OTHER mail
# domains, outside this deployment. We never run them, so entries carry only
# identity + role + description — tools, budgets, LLM and ACL settings do not
# apply. Listing a peer here does two things:
#   1. it appears in every agent's {{coworkers}} block tagged "scope":"external"
#      so the model knows it can delegate to it, and
#   2. it relaxes message_tool's same-domain send gate for that exact address,
#      so an agent can email it cross-domain (the roster is the allowlist —
#      arbitrary outside addresses are still blocked).
#
# The roster is OUTBOUND ONLY. A partner emailing IN is still gated by each
# agent's `whitelist:` above — add the partner's address or domain there too
# for two-way collaboration, or its replies bounce at the ACL. The runtime
# logs a startup warning for any external peer not covered by the whitelist.
external:
  - name: Atlas
    email: atlas@partner-corp.com
    role: Logistics Coordinator
    description: Schedules shipments and prepares customs documents for EU orders.
  - name: Nova
    email: nova@othermachine.example.net
    role: Billing Agent
    description: Issues and reconciles invoices.
